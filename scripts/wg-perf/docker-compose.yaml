services:
  perf:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: nre-wg-perf-runner:latest
    container_name: nre-perf
    working_dir: /work
    command:
      - sh
      - -lc
      - |
        set -eu
        printf '%s\n' "$$HARNESS_WG_CLIENT_PRIVATE_KEY" > /tmp/wg-client.key
        ip link add wg0 type wireguard
        wg set wg0 private-key /tmp/wg-client.key peer "$$HARNESS_WG_SERVER_PUBLIC_KEY" endpoint "$$HARNESS_WG_ENDPOINT" allowed-ips "$$HARNESS_WG_ALLOWED_IPS" persistent-keepalive 5
        ip address add "$$HARNESS_WG_CLIENT_ADDRESS" dev wg0
        ip link set mtu "$$HARNESS_WG_MTU" up dev wg0
        ip route replace "$$HARNESS_WG_ALLOWED_IPS" dev wg0
        /usr/local/go/bin/go run /work/harness.go
    environment:
      HARNESS_MODE: bench
      HARNESS_RTT_ITERATIONS: ${HARNESS_RTT_ITERATIONS:-}
      HARNESS_BENCHMARKS: ${HARNESS_BENCHMARKS:-}
      HARNESS_C1_BYTES: ${HARNESS_C1_BYTES:-}
      HARNESS_C1_DURATION_SECONDS: ${HARNESS_C1_DURATION_SECONDS:-}
      HARNESS_C8_BYTES_PER_CONN: ${HARNESS_C8_BYTES_PER_CONN:-}
      HARNESS_C8_DURATION_SECONDS: ${HARNESS_C8_DURATION_SECONDS:-}
      HARNESS_C8_CONCURRENCY: ${HARNESS_C8_CONCURRENCY:-}
      HARNESS_MASTER_ADDR: ${HARNESS_MASTER_ADDR:-:8080}
      HARNESS_ENTRY_ADDRESS: ${HARNESS_ENTRY_ADDRESS:-10.80.0.1:7000}
      HARNESS_DIRECT_ADDRESS: ${HARNESS_DIRECT_ADDRESS:-172.30.0.20:9001}
      HARNESS_PRE_MEASURE_DELAY_MS: ${HARNESS_PRE_MEASURE_DELAY_MS:-}
      HARNESS_BACKEND_HOST: ${HARNESS_BACKEND_HOST:-172.30.3.13}
      HARNESS_BACKEND_PORT: ${HARNESS_BACKEND_PORT:-9002}
      HARNESS_WG_ENTRY_HOST: ${HARNESS_WG_ENTRY_HOST:-172.30.0.10}
      HARNESS_WG_ENTRY_PORT: ${HARNESS_WG_ENTRY_PORT:-51820}
      HARNESS_WG_RELAY_HOST: ${HARNESS_WG_RELAY_HOST:-172.30.2.15}
      HARNESS_WG_RELAY_PORT: ${HARNESS_WG_RELAY_PORT:-51820}
      HARNESS_WG_TUNNEL_HOST: ${HARNESS_WG_TUNNEL_HOST:-10.80.0.1}
      HARNESS_WG_TUNNEL_PORT: ${HARNESS_WG_TUNNEL_PORT:-9443}
      HARNESS_WG_CLIENT_PRIVATE_KEY: ${HARNESS_WG_CLIENT_PRIVATE_KEY:-AAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEA=}
      HARNESS_WG_SERVER_PUBLIC_KEY: ${HARNESS_WG_SERVER_PUBLIC_KEY:-rTPV4sH+pXCPcgPXWaOCbz33sf5z/H10k76moE+10VQ=}
      HARNESS_WG_ENDPOINT: ${HARNESS_WG_ENDPOINT:-172.30.2.15:51820}
      HARNESS_WG_ALLOWED_IPS: ${HARNESS_WG_ALLOWED_IPS:-10.80.0.1/32}
      HARNESS_WG_CLIENT_ADDRESS: ${HARNESS_WG_CLIENT_ADDRESS:-10.80.0.2/32}
      HARNESS_WG_MTU: ${HARNESS_WG_MTU:-1280}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 200ms
      timeout: 200ms
      retries: 100
    volumes:
      - ./harness.go:/work/harness.go:ro
    cap_add:
      - NET_ADMIN
    tmpfs:
      - /tmp:exec
    networks:
      control:
        ipv4_address: 172.30.0.2
        aliases:
          - perf-control
      a_relay:
        ipv4_address: 172.30.2.2
        aliases:
          - cli-wg

  backend-b:
    image: nre-wg-perf-runner:latest
    container_name: nre-backend-b
    working_dir: /work
    command: ["go", "run", "/work/harness.go"]
    environment:
      HARNESS_MODE: backend
      HARNESS_BACKEND_LISTEN_ADDR: ${HARNESS_BACKEND_LISTEN_ADDR:-:9002}
    volumes:
      - ./harness.go:/work/harness.go:ro
    tmpfs:
      - /tmp:exec
    cap_add:
      - NET_ADMIN
    networks:
      b_local:
        ipv4_address: 172.30.3.13
        aliases:
          - backend-b-local

  relay-a1:
    image: nre-agent-wg-perf:latest
    container_name: nre-relay-a1
    environment:
      NRE_AGENT_ID: relay-a1
      NRE_AGENT_NAME: relay-a1
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_RELAY_A1_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_RELAY_A1_PPROF_PORT:-6061}:6060"
    depends_on:
      perf:
        condition: service_healthy
      relay-wg:
        condition: service_started
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.11
      a_relay:
        ipv4_address: 172.30.2.11
      relay_mid:
        ipv4_address: 172.30.4.11

  relay-a2:
    image: nre-agent-wg-perf:latest
    container_name: nre-relay-a2
    environment:
      NRE_AGENT_ID: relay-a2
      NRE_AGENT_NAME: relay-a2
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_RELAY_A2_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_RELAY_A2_PPROF_PORT:-6062}:6060"
    depends_on:
      perf:
        condition: service_healthy
      relay-wg:
        condition: service_started
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.12
      a_relay:
        ipv4_address: 172.30.2.12
      relay_mid:
        ipv4_address: 172.30.4.12

  relay-b3:
    image: nre-agent-wg-perf:latest
    container_name: nre-relay-b3
    environment:
      NRE_AGENT_ID: relay-b3
      NRE_AGENT_NAME: relay-b3
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_RELAY_B3_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_RELAY_B3_PPROF_PORT:-6063}:6060"
    depends_on:
      perf:
        condition: service_healthy
      relay-a1:
        condition: service_started
      relay-a2:
        condition: service_started
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.13
      relay_mid:
        ipv4_address: 172.30.4.13
      b_local:
        ipv4_address: 172.30.3.11

  relay-b4:
    image: nre-agent-wg-perf:latest
    container_name: nre-relay-b4
    environment:
      NRE_AGENT_ID: relay-b4
      NRE_AGENT_NAME: relay-b4
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_RELAY_B4_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_RELAY_B4_PPROF_PORT:-6064}:6060"
    depends_on:
      perf:
        condition: service_healthy
      relay-a1:
        condition: service_started
      relay-a2:
        condition: service_started
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.14
      relay_mid:
        ipv4_address: 172.30.4.14
      b_local:
        ipv4_address: 172.30.3.14

  relay-wg:
    build:
      context: ../..
      dockerfile: scripts/wg-perf/Dockerfile.agent
    image: nre-agent-wg-perf:latest
    container_name: nre-relay-wg
    environment:
      NRE_AGENT_ID: relay-wg
      NRE_AGENT_NAME: relay-wg
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_RELAY_WG_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_RELAY_WG_PPROF_PORT:-6060}:6060"
    depends_on:
      perf:
        condition: service_healthy
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.15
      a_relay:
        ipv4_address: 172.30.2.15
      b_local:
        ipv4_address: 172.30.3.15
      relay_mid:
        ipv4_address: 172.30.4.15

  agent-b:
    image: nre-agent-wg-perf:latest
    container_name: nre-agent-b
    environment:
      NRE_AGENT_ID: agent-b
      NRE_AGENT_NAME: agent-b
      NRE_AGENT_TOKEN: token
      NRE_MASTER_URL: http://perf-control:8080
      NRE_HEARTBEAT_INTERVAL: ${HARNESS_AGENT_HEARTBEAT_INTERVAL:-30s}
      NRE_DATA_DIR: /data
      NRE_TRAFFIC_STATS_ENABLED: ${NRE_TRAFFIC_STATS_ENABLED:-true}
      NRE_PPROF_ADDR: ${HARNESS_AGENT_B_PPROF_ADDR:-:6060}
    ports:
      - "${HARNESS_AGENT_B_PPROF_PORT:-6065}:6060"
    depends_on:
      perf:
        condition: service_healthy
      relay-b3:
        condition: service_started
      relay-b4:
        condition: service_started
      relay-wg:
        condition: service_started
      backend-b:
        condition: service_started
    cap_add:
      - NET_ADMIN
    tmpfs:
      - /data
    networks:
      control:
        ipv4_address: 172.30.0.20
        aliases:
          - agent-b-control
      b_local:
        ipv4_address: 172.30.3.12
        aliases:
          - agent-b-local

networks:
  control:
    name: nre-wg-perf-control
    ipam:
      config:
        - subnet: 172.30.0.0/24
  a_relay:
    name: nre-wg-perf-a-relay
    ipam:
      config:
        - subnet: 172.30.2.0/24
  b_local:
    name: nre-wg-perf-b-local
    ipam:
      config:
        - subnet: 172.30.3.0/24
  relay_mid:
    name: nre-wg-perf-relay-mid
    ipam:
      config:
        - subnet: 172.30.4.0/24
