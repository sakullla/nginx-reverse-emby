name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - docs-site/**
      - .github/workflows/docs-pages.yml
  workflow_dispatch:

env:
  PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # First-time auto-enablement requires a PAT/GitHub App token with
          # Pages write + Administration write permissions. If this secret is
          # not set, enable Pages once in repository Settings -> Pages and set
          # Source to "GitHub Actions".
          token: ${{ env.PAGES_ENABLEMENT_TOKEN || github.token }}
          enablement: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs
        working-directory: docs-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
