name: Client Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: client-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-android:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: clients/flutter
        run: flutter pub get

      - name: Build Android APK
        working-directory: clients/flutter
        run: flutter build apk --release

      - name: Stage Android asset
        shell: bash
        run: |
          mkdir -p dist
          cp clients/flutter/build/app/outputs/flutter-apk/app-release.apk dist/nre-client-android.apk
          (cd dist && sha256sum nre-client-android.apk > nre-client-android.apk.sha256)

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: nre-client-android
          path: |
            dist/nre-client-android.apk
            dist/nre-client-android.apk.sha256
          if-no-files-found: error

  flutter-windows:
    name: Build Flutter Windows ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: clients/flutter
        run: flutter pub get

      - name: Build Windows client
        working-directory: clients/flutter
        run: flutter build windows --release

      - name: Stage Windows asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path clients/flutter/build/windows/x64/runner/Release/* -DestinationPath dist/nre-client-windows-x64.zip -Force
          (Get-FileHash dist/nre-client-windows-x64.zip -Algorithm SHA256).Hash.ToLower() + "  nre-client-windows-x64.zip" | Out-File -FilePath dist/nre-client-windows-x64.zip.sha256 -Encoding ascii

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nre-client-windows-x64
          path: |
            dist/nre-client-windows-x64.zip
            dist/nre-client-windows-x64.zip.sha256
          if-no-files-found: error

  flutter-macos:
    name: Build Flutter macOS ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: clients/flutter
        run: flutter pub get

      - name: Build macOS client
        working-directory: clients/flutter
        run: flutter build macos --release

      - name: Stage macOS asset
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent clients/flutter/build/macos/Build/Products/Release/nre_client.app dist/nre-client-macos.zip
          (cd dist && shasum -a 256 nre-client-macos.zip > nre-client-macos.zip.sha256)

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nre-client-macos
          path: |
            dist/nre-client-macos.zip
            dist/nre-client-macos.zip.sha256
          if-no-files-found: error

  go-agent:
    name: Build Go Agent Desktop Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: nre-agent-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: nre-agent-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            artifact: nre-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: nre-agent-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-agent/go.mod
          cache-dependency-path: go-agent/go.sum

      - name: Build agent
        working-directory: go-agent
        shell: bash
        run: |
          mkdir -p ../dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../dist/${{ matrix.artifact }} ./cmd/nre-agent

      - name: Package agent
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip nre-agent-windows-amd64.zip ${{ matrix.artifact }}
            sha256sum nre-agent-windows-amd64.zip > nre-agent-windows-amd64.zip.sha256
          else
            tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error

  cloudflare-worker:
    name: Package Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Stage Worker asset
        shell: bash
        run: |
          mkdir -p dist
          cp workers/cloudflare/nre-worker.js dist/nre-worker.js
          (cd dist && sha256sum nre-worker.js > nre-worker.js.sha256)

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: nre-worker
          path: |
            dist/nre-worker.js
            dist/nre-worker.js.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - flutter-android
      - flutter-windows
      - flutter-macos
      - go-agent
      - cloudflare-worker

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
