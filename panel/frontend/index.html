<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nginx Reverse Emby Panel</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script>
  // Prevent theme flash: read theme before first paint
  (function() {
    var themeMap = { 'sakura': 'sakura-day', 'midnight': 'sakura-night', 'cyberpunk': 'sakura-day' };
    var saved = localStorage.getItem('theme');
    var resolved = themeMap[saved] || saved;
    var valid = ['sakura-day', 'sakura-night', 'business'];
    var t = valid.includes(resolved)
      ? resolved
      : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'sakura-night' : 'sakura-day');
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
