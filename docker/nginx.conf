user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
worker_cpu_affinity auto;
worker_shutdown_timeout 30s;
error_log  /proc/1/fd/2 notice;
pid        /var/run/nginx.pid;


events {
    worker_connections 65535;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" "$request_uri"';
    access_log /proc/1/fd/1 main;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    map $remote_addr $proxy_forwarded_elem {
        ~^[0-9.]+$        "for=$remote_addr";
        ~^[0-9A-Fa-f:.]+$ "for=\"[$remote_addr]\"";
        default           "for=unknown";
    }

    map $http_forwarded $proxy_add_forwarded {
        "~^(,[ \\t]*)*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*([ \\t]*,([ \\t]*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*)?)*$" "$http_forwarded, $proxy_forwarded_elem";
        default "$proxy_forwarded_elem";
    }

    map $http_sec_fetch_mode $early_hints {
        navigate $http2$http3;
    }

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    gzip on;                          # ејҖеҗҜ gzip
    gzip_vary on;                     # ж”ҜжҢҒ Vary еӨҙпјҢжҸҗеҚҮзј“еӯҳж•Ҳжһң
    gzip_proxied any;                 # д»ЈзҗҶжңҚеҠЎеҷЁзҡ„е“Қеә”д№ҹеҺӢзј©
    gzip_comp_level 6;                # еҺӢзј©зә§еҲ«пјҲ1-9пјҢж•°еӯ—и¶ҠеӨ§еҺӢзј©зҺҮи¶Ҡй«ҳпјҢеҚ з”ЁCPUи¶ҠеӨҡпјү
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;  # жҢҮе®ҡиҰҒеҺӢзј©зҡ„ MIME зұ»еһӢ

    client_max_body_size ${nginx_client_max_body_size};
    client_body_buffer_size ${nginx_client_body_buffer_size};
    client_body_timeout 1h;
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_socket_keepalive on;

    # дҝЎд»»жүҖжңү RFC 1918 е®ҡд№үзҡ„з§ҒжңүзҪ‘з»ңең°еқҖ
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    # еҗҢж ·дҝЎд»» Docker for Mac/Windows зҡ„еҶ…йғЁдё»жңәең°еқҖ
    set_real_ip_from 192.168.65.0/24; # Docker Desktop internal
    # дҝЎд»»жң¬жңәеӣһзҺҜең°еқҖ
    set_real_ip_from 127.0.0.1;
    # д»Һ X-Real-IP Header дёӯиҺ·еҸ–зңҹе®һ IP
    real_ip_header X-Real-IP;

    server {
        listen 127.0.0.1:18080;
${status_ipv6_listen}

        # Internal monitoring
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
${status_ipv6_allow}
            deny all;
        }
    }

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/conf.d/dynamic/*.conf;
}

stream {
    tcp_nodelay on;
    proxy_socket_keepalive on;
    proxy_buffer_size 16k;

    log_format l4_main '$remote_addr [$time_local] $protocol $status '
                       '$bytes_sent $bytes_received $session_time '
                       '"$upstream_addr"';

    include /etc/nginx/stream-conf.d/limit_conn_zones.inc;
    include /etc/nginx/stream-conf.d/*.conf;
    include /etc/nginx/stream-conf.d/dynamic/*.conf;
}
