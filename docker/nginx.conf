user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
worker_cpu_affinity auto;
worker_shutdown_timeout 30s;
error_log  /proc/1/fd/2 notice;
pid        /var/run/nginx.pid;


events {
    worker_connections 65535;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" "$request_uri"';
    access_log /proc/1/fd/1 main;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # Prefer upstream X-Forwarded-Proto; fall back to $scheme for direct connections
    map $http_x_forwarded_proto $real_forwarded_proto {
        default  $scheme;
        http     http;
        https    https;
    }

    map $remote_addr $proxy_forwarded_elem {
        ~^[0-9.]+$        "for=$remote_addr";
        ~^[0-9A-Fa-f:.]+$ "for=\"[$remote_addr]\"";
        default           "for=unknown";
    }

    map $http_forwarded $proxy_add_forwarded {
        "~^(,[ \\t]*)*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*([ \\t]*,([ \\t]*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*)?)*$" "$http_forwarded, $proxy_forwarded_elem";
        default "$proxy_forwarded_elem";
    }

    map $http_sec_fetch_mode $early_hints {
        navigate $http2$http3;
    }

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    gzip on;                          # 开启 gzip
    gzip_vary on;                     # 支持 Vary 头，提升缓存效果
    gzip_proxied any;                 # 代理服务器的响应也压缩
    gzip_comp_level 6;                # 压缩级别（1-9，数字越大压缩率越高，占用CPU越多）
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;  # 指定要压缩的 MIME 类型

    client_max_body_size ${nginx_client_max_body_size};
    client_body_buffer_size ${nginx_client_body_buffer_size};
    client_body_timeout 1h;
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_socket_keepalive on;

    # 信任所有 RFC 1918 定义的私有网络地址
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    # 同样信任 Docker for Mac/Windows 的内部主机地址
    set_real_ip_from 192.168.65.0/24; # Docker Desktop internal
    # 信任本机回环地址
    set_real_ip_from 127.0.0.1;
    # 从 X-Real-IP Header 中获取真实 IP
    real_ip_header X-Real-IP;

    server {
        listen 127.0.0.1:18080;
${status_ipv6_listen}

        # Internal monitoring
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
${status_ipv6_allow}
            deny all;
        }
    }

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/conf.d/dynamic/*.conf;
}

stream {
    tcp_nodelay on;
    proxy_socket_keepalive on;
    proxy_buffer_size 16k;

    log_format l4_main '$remote_addr [$time_local] $protocol $status '
                       '$bytes_sent $bytes_received $session_time '
                       '"$upstream_addr"';

    include /etc/nginx/stream-conf.d/limit_conn_zones.inc;
    include /etc/nginx/stream-conf.d/*.conf;
    include /etc/nginx/stream-conf.d/dynamic/*.conf;
}
