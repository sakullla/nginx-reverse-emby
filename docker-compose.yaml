services:
  nginx-reverse-emby:
    image: ${NRE_IMAGE:-sakullla/nginx-reverse-emby:latest}
    container_name: nginx-reverse-emby
    restart: unless-stopped
    network_mode: host

    environment:
      # 面板 / Master 角色
      PANEL_ROLE: master
      PANEL_BACKEND_HOST: ${PANEL_BACKEND_HOST:-127.0.0.1}
      PANEL_BACKEND_PORT: "8080"

      # 面板登录 token；必须在启动前设置为随机长字符串
      API_TOKEN: ${API_TOKEN:?set API_TOKEN to a random 32+ character token}

      # Agent 注册 token；必须不同于 API_TOKEN
      MASTER_REGISTER_TOKEN: ${MASTER_REGISTER_TOKEN:?set MASTER_REGISTER_TOKEN to a random 32+ character token}

      # 公网/HTTPS 反代部署时设置，例如 https://panel.example.com
      NRE_PUBLIC_URL: ${NRE_PUBLIC_URL:-}
      # 无域名 HTTP 临时部署时可设置随机面板入口，例如 /panel-a1b2c3d4
      NRE_PANEL_PUBLIC_PATH: ${NRE_PANEL_PUBLIC_PATH:-}
      # 仅当上游反代会清洗并重写 X-Forwarded-* 头时开启
      # NRE_TRUST_FORWARDED_HEADERS: "true"

      # Master 内嵌 local agent（默认启用）
      NRE_ENABLE_LOCAL_AGENT: "1"
      NRE_LOCAL_AGENT_ID: local
      NRE_LOCAL_AGENT_NAME: local
      # 控制面板统一时区；用于日/月汇总、周期边界和流量清理口径
      NRE_TIMEZONE: ${NRE_TIMEZONE:-Asia/Shanghai}
      # 可选：关闭 WireGuard 模块
      # NRE_WIREGUARD_ENABLED: "false"

      # DNS 验证（按需启用，如 Cloudflare）
      ACME_DNS_PROVIDER: ${ACME_DNS_PROVIDER:-}
      CF_TOKEN: ${CF_TOKEN:-}

    volumes:
      - ./data:/opt/nginx-reverse-emby/panel/data
