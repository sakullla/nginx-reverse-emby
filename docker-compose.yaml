services:
  nginx-reverse-emby:
    image: ghcr.io/sakullla/nginx-reverse-emby:latest
    container_name: nginx-reverse-emby
    restart: unless-stopped
    network_mode: host

    environment:
      # 面板 / Master 角色
      PANEL_ROLE: master
      PANEL_BACKEND_HOST: 0.0.0.0
      PANEL_BACKEND_PORT: "8080"

      # 面板登录 token
      API_TOKEN: change-this-token

      # Agent 注册 token（不使用 Agent 可忽略）
      MASTER_REGISTER_TOKEN: change-this-register-token

      # Master 内嵌 local agent（默认启用）
      NRE_ENABLE_LOCAL_AGENT: "1"
      NRE_LOCAL_AGENT_ID: local
      NRE_LOCAL_AGENT_NAME: local

      # DNS 验证示例（按需启用，如 Cloudflare）
      # ACME_DNS_PROVIDER: cf
      # CF_TOKEN: your-cloudflare-api-token

    volumes:
      - ./data:/opt/nginx-reverse-emby/panel/data
