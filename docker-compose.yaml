services:
  nginx-reverse-emby:
    build: .
    container_name: nginx-reverse-emby
    restart: always
    network_mode: host
    environment:
      # 部署模式: direct (直连) 或 front_proxy (前置代理)
      - PROXY_DEPLOY_MODE=direct
      # 初始规则 (可选)
      - PROXY_RULE_1=https://emby.example.com,http://192.168.1.10:8096
      # API 控制台 Token
      - API_TOKEN=admin
      # ACME 邮箱 (用于证书申请)
      - ACME_EMAIL=your@email.com
      # DNS 提供商 (可选，如 dns_cf)
      - ACME_DNS_PROVIDER=
    volumes:
      # 统一映射所有持久化数据 (包含规则、证书、acme记录)
      - ./data:/opt/nginx-reverse-emby/panel/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
